    <h1 class="p-name article-title" itemprop="headline name">
      qrcode生成二维码并合成海报
    </h1>
  

      </header>
    
    <div class="e-content article-entry" itemprop="articleBody">
      
        <p>需求：根据分享码和项目名，生成二维码并合成到海报模版中。</p>
<p>方案：使用插件<a target="_blank" rel="noopener" href="https://www.npmjs.com/package/qrcode">qrcode</a> 生成二维码，使用插件<a target="_blank" rel="noopener" href="https://www.npmjs.com/package/canvas-to-image">canvas-to-image</a> 合成海报。</p>
<figure class="highlight js"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br><span class="line">43</span><br><span class="line">44</span><br><span class="line">45</span><br><span class="line">46</span><br><span class="line">47</span><br><span class="line">48</span><br><span class="line">49</span><br><span class="line">50</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">async</span> <span class="title function_">getQRCode</span>(<span class="params">url</span>) &#123;</span><br><span class="line">  <span class="keyword">try</span> &#123;</span><br><span class="line">    <span class="keyword">let</span> opts = &#123;</span><br><span class="line">      <span class="attr">errorCorrectionLevel</span>: <span class="string">&#x27;L&#x27;</span>, <span class="comment">// 容错级别</span></span><br><span class="line">      <span class="attr">type</span>: <span class="string">&#x27;image/png&#x27;</span>, <span class="comment">// 二维码类型</span></span><br><span class="line">      <span class="attr">margin</span>: <span class="number">0</span>,</span><br><span class="line">      <span class="attr">width</span>: <span class="number">480</span>, <span class="comment">// 二维码宽度</span></span><br><span class="line">      <span class="attr">height</span>: <span class="number">480</span>, <span class="comment">// 二维码高度</span></span><br><span class="line">      <span class="attr">color</span>: &#123;</span><br><span class="line">        <span class="attr">dark</span>: <span class="string">&#x27;#333&#x27;</span>, <span class="comment">// 前景色</span></span><br><span class="line">        <span class="attr">light</span>: <span class="string">&#x27;#fff&#x27;</span> <span class="comment">// 背景色</span></span><br><span class="line">      &#125;</span><br><span class="line">    &#125;</span><br><span class="line">    <span class="keyword">const</span> qrCodeCanvas = <span class="variable language_">document</span>.<span class="title function_">getElementById</span>(<span class="string">&#x27;qrCodeCanvas&#x27;</span>)</span><br><span class="line">    <span class="keyword">await</span> <span class="title class_">QRCode</span>.<span class="title function_">toCanvas</span>(qrCodeCanvas, url, opts, <span class="function">(<span class="params">error</span>) =&gt;</span> &#123;</span><br><span class="line">      <span class="variable language_">console</span>.<span class="title function_">error</span>(error); <span class="comment">// 生成二维码异常</span></span><br><span class="line">    &#125;)</span><br><span class="line">    <span class="variable language_">this</span>.<span class="title function_">getImageUrl</span>(qrCodeCanvas.<span class="title function_">toDataURL</span>()); <span class="comment">// 将当前元素内容编码成一张图片的 Data URI</span></span><br><span class="line">  &#125; <span class="keyword">catch</span> (error) &#123;</span><br><span class="line">    <span class="variable language_">console</span>.<span class="title function_">log</span>(error);</span><br><span class="line">  &#125;</span><br><span class="line">&#125;,</span><br><span class="line"><span class="comment">// 二维码图片和背景图合成海报</span></span><br><span class="line"><span class="title function_">createPoster</span>(<span class="params">qrcodeUrl</span>) &#123;</span><br><span class="line">  <span class="keyword">try</span> &#123;</span><br><span class="line">    <span class="keyword">const</span> canvas = <span class="variable language_">document</span>.<span class="title function_">getElementById</span>(<span class="string">&#x27;posterCanvas&#x27;</span>);</span><br><span class="line">    <span class="keyword">const</span> bacImg = <span class="keyword">new</span> <span class="title class_">Image</span>();</span><br><span class="line">    bacImg.<span class="property">src</span> = <span class="variable language_">this</span>.<span class="property">backgroundImg</span>; <span class="comment">// 设置海报背景图</span></span><br><span class="line">    <span class="keyword">let</span> that = <span class="variable language_">this</span>;</span><br><span class="line">    bacImg.<span class="property">onload</span> = <span class="keyword">function</span> (<span class="params"></span>) &#123;</span><br><span class="line">      canvas.<span class="property">width</span> = bacImg.<span class="property">width</span>; <span class="comment">// 背景图宽</span></span><br><span class="line">      canvas.<span class="property">height</span> = bacImg.<span class="property">height</span>; <span class="comment">// 背景图高</span></span><br><span class="line">      <span class="keyword">let</span> context = canvas.<span class="title function_">getContext</span>(<span class="string">&#x27;2d&#x27;</span>);</span><br><span class="line">      context.<span class="title function_">rect</span>(<span class="number">0</span>, <span class="number">0</span>, canvas.<span class="property">width</span>, canvas.<span class="property">height</span>);</span><br><span class="line">      context.<span class="property">fillStyle</span> = <span class="string">&#x27;#fff&#x27;</span>;</span><br><span class="line">      context.<span class="title function_">fill</span>();</span><br><span class="line">      context.<span class="title function_">drawImage</span>(bacImg, <span class="number">0</span>, <span class="number">0</span>, canvas.<span class="property">width</span>, canvas.<span class="property">height</span>); <span class="comment">// 绘制背景图</span></span><br><span class="line">      <span class="keyword">const</span> qrCodeImg = <span class="keyword">new</span> <span class="title class_">Image</span>();</span><br><span class="line">      qrCodeImg.<span class="property">src</span> = qrcodeUrl; <span class="comment">// 设置二维码图</span></span><br><span class="line">      qrCodeImg.<span class="property">onload</span> = <span class="keyword">function</span> (<span class="params"></span>) &#123;</span><br><span class="line">        <span class="keyword">let</span> x = <span class="number">0</span>; <span class="comment">// 二维码以背景图横向偏离位置</span></span><br><span class="line">        <span class="keyword">let</span> y = <span class="number">0</span>; <span class="comment">// 二维码以背景图纵向偏离位置</span></span><br><span class="line">        context.<span class="title function_">drawImage</span>(qrCodeImg, x, y, qrCodeImg.<span class="property">width</span>, qrCodeImg.<span class="property">height</span>); <span class="comment">// 绘制二维码图</span></span><br><span class="line">        that.<span class="property">placardUrl</span> = canvas.<span class="title function_">toDataURL</span>(<span class="string">&quot;image/jpeg&quot;</span>, <span class="number">1.0</span>); <span class="comment">// 合成海报图片base64编码</span></span><br><span class="line">      &#125;</span><br><span class="line">    &#125;</span><br><span class="line">  &#125; <span class="keyword">catch</span> (error) &#123;</span><br><span class="line">    <span class="variable language_">console</span>.<span class="title function_">log</span>(error);</span><br><span class="line">  &#125;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>
